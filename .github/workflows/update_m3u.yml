name: M3U Güncelleme

on:
  schedule:
    - cron: '0 */6 * * *'   # Her 6 saatte bir çalışır
  workflow_dispatch:        # Manuel tetikleme

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Repoya yazma izni

    steps:
      - name: Depoyu klonla
        uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install requests beautifulsoup4

      - name: Betiği çalıştır
        run: python find_m3u8.py

      - name: Değişiklikleri commit et ve pushla
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "M3U dosyası güncellendi [otomatik]"
          file_pattern: "playlist.m3u"
