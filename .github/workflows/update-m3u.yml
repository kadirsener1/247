name: Update M3U Playlist

on:
  # Her 3 saatte bir çalışsın (fazla sıklık gerekmez)
  schedule:
    - cron: '0 */3 * * *'
  
  # Manuel tetikleme
  workflow_dispatch:
  
  # Sadece gerekli dosyalar değiştiğinde
  push:
    branches:
      - main
    paths:
      - 'scraper_async.py'
      - 'channels.txt'
      - 'requirements.txt'

concurrency:
  group: update-m3u
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest  # ubuntu-22.04 yerine latest
    timeout-minutes: 8  # 10'dan 8'e düşürüldü
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # pip cache'i aktif
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install aiohttp aiodns
          # requirements.txt varsa onu kullan
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 🔍 Run async scraper
        run: python scraper_async.py
        env:
          PYTHONUNBUFFERED: "1"
          MAX_WORKERS: "30"  # Paralel işlem sayısı
      
      - name: 📤 Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f tv247.m3u
          
          # Değişiklik kontrolü
          if git diff --cached --quiet; then
            echo "📝 Değişiklik yok, commit gerekmiyor"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            git commit -m "🔄 Update playlist | ${TIMESTAMP}"
            git push
            echo "✅ Değişiklikler push edildi"
          fi
      
      - name: 💾 Save execution log
        if: always()
        run: |
          echo "Last run: $(date)" > last_run.txt
          git add -f last_run.txt 2>/dev/null || true
