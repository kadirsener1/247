name: Update M3U Playlist

on:
  schedule:
    - cron: '0 */3 * * *'  # Her 3 saatte bir
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scraper_async.py'
      - 'channels.txt'

concurrency:
  group: update-m3u
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install aiohttp
      
      - name: 🔍 Run async scraper
        run: python scraper_async.py
        env:
          PYTHONUNBUFFERED: "1"
          MAX_WORKERS: "25"
      
      - name: 📤 Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f tv247.m3u
          
          if git diff --cached --quiet; then
            echo "✅ Değişiklik yok"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            git commit -m "🔄 Update playlist | ${TIMESTAMP}"
            git push
          fi
