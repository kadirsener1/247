import requests
import re
import concurrent.futures
from concurrent.futures import ThreadPoolExecutor
from urllib.parse import urlparse
import time

def extract_channel_name(url):
    """URL'den kanal adını çıkarmak için hızlı regex"""
    patterns = [
        r'/([^/]+)\.(?:m3u8|mp4|ts)',
        r'/([^/]+?)(?:\?|$)',
        r'/([^/]+)/index',
    ]
    
    for pattern in patterns:
        match = re.search(pattern, url)
        if match:
            name = match.group(1).replace('_', ' ').replace('-', ' ')
            name = re.sub(r'\d+[kKpP]?$', '', name)
            return name.title().strip()
    return None

def test_stream_url(url, channel_name):
    """Tek bir URL'yi test et - optimize edilmiş"""
    try:
        # Daha kısa timeout ve sadece header kontrolü
        response = requests.head(url, timeout=3, allow_redirects=True)
        if response.status_code == 200:
            return (url, channel_name, True)
        
        # HEAD çalışmazsa GET ile dene (ama sadece küçük veri)
        response = requests.get(url, timeout=3, stream=True)
        if response.status_code == 200:
            response.close()  # Hemen kapat
            return (url, channel_name, True)
            
    except:
        pass
    return (url, channel_name, False)

def read_channels():
    """Kanal listesini oku"""
    try:
        with open('channels.txt', 'r') as f:
            return [line.strip() for line in f if line.strip() and not line.startswith('#')]
    except:
        return []

def batch_test_urls(channels):
    """Paralel olarak URL'leri test et"""
    results = []
    
    # Maksimum 10 paralel iş parçacığı
    with ThreadPoolExecutor(max_workers=10) as executor:
        futures = []
        for channel in channels:
            if '::' in channel:
                name, url = channel.split('::', 1)
                futures.append(executor.submit(test_stream_url, url.strip(), name.strip()))
            else:
                futures.append(executor.submit(test_stream_url, channel, extract_channel_name(channel)))
        
        # Hızlı sonuç toplama
        for future in concurrent.futures.as_completed(futures):
            try:
                result = future.result(timeout=5)
                if result[2]:  # Sadece çalışanları al
                    results.append(f"{result[1]},{result[0]}")
            except:
                pass
    
    return results

def create_m3u8(working_streams):
    """M3U8 dosyası oluştur"""
    content = "#EXTM3U\n"
    for stream in working_streams:
        try:
            name, url = stream.split(',', 1)
            content += f'#EXTINF:-1 tvg-logo="" group-title="TV",{name}\n{url}\n'
        except:
            continue
    return content

def main():
    print("📺 Kanal taranıyor...")
    
    # Kanalları oku
    channels = read_channels()
    if not channels:
        print("❌ Kanal bulunamadı!")
        return
    
    print(f"🔍 {len(channels)} kanal taranıyor (paralel mod)...")
    
    start_time = time.time()
    
    # Batch halinde test et
    working = batch_test_urls(channels)
    
    elapsed = time.time() - start_time
    
    print(f"✅ {len(working)} çalışan kanal bulundu ({elapsed:.1f} saniye)")
    
    # M3U8 oluştur
    m3u8_content = create_m3u8(working)
    
    # Dosyaya yaz
    with open('tv247.m3u', 'w', encoding='utf-8') as f:
        f.write(m3u8_content)
    
    print(f"💾 {len(working)} kanal ile tv247.m3u oluşturuldu")

if __name__ == "__main__":
    main()
